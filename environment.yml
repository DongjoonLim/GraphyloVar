name: graphylo
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.8
  - numpy>=1.20,<2
  - pandas>=1.3
  - scipy>=1.8
  - scikit-learn
  - biopython
  - tqdm
  - pybigwig
  - networkx>=2.6
  - matplotlib
  - pyyaml
  - pip
  - pip:
    - tensorflow>=2.6
    - optree>=0.11
    - spektral>=1.1
    - focal-loss
